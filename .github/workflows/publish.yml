on:
  workflow_dispatch:
  #push:
  #  branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/sformel/bds-primer-guidelines:latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Render site
        run: quarto render

      - name: Publish to gh-pages
        run: quarto publish gh-pages --no-browser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}