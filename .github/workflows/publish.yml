name: Quarto Publish

on:
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    container:
      image: ghcr.io/sformel/bds-primer-guidelines:latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          # Use the exact path the error message complained about
          git config --global --add safe.directory /__w/bds-primer-guidelines/bds-primer-guidelines
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Render site
        run: quarto render

      - name: Publish to gh-pages
        run: quarto publish gh-pages --no-browser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}